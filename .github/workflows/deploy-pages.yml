name: Deploy to GitHub Pages

# main への push で自動的に GitHub Pages へ公開する。
# 手動実行（Actions タブの Run workflow）も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ用の権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（公開中のデプロイは中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # enablement: true で Pages 未設定なら自動で有効化（ソース=GitHub Actions）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        # ソース(gacha-para/)からルートの index.html / standalone.html を生成
        run: python3 gacha-para/build.py

      - name: Upload artifact
        # リポジトリのルートをそのまま公開（ルートの index.html がトップページ）
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
